<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="32" fill="#0c2d38"/>

  <!-- Body / shoulders — casual tee -->
  <ellipse cx="32" cy="76" rx="26" ry="18" fill="#0a1f28"/>
  <ellipse cx="32" cy="73" rx="20" ry="14" fill="#0e3344"/>
  <!-- T-shirt collar -->
  <path d="M26 65 Q32 68 38 65 L36 80 L28 80 Z" fill="#164e63"/>

  <!-- Neck -->
  <rect x="28.5" y="47" width="7" height="9" rx="2" fill="#c8925c"/>

  <!-- Head -->
  <ellipse cx="32" cy="33" rx="13" ry="14" fill="#c8925c"/>

  <!-- Hair — short, slightly messy/wavy on top -->
  <ellipse cx="32" cy="20" rx="13" ry="7" fill="#3d2510"/>
  <ellipse cx="32" cy="23.5" rx="13" ry="5" fill="#3d2510"/>
  <ellipse cx="19.5" cy="29" rx="4.5" ry="7.5" fill="#3d2510"/>
  <ellipse cx="44.5" cy="29" rx="4.5" ry="7.5" fill="#3d2510"/>
  <!-- Messy hair tufts on top -->
  <ellipse cx="28" cy="17" rx="5" ry="4" fill="#4a2e12"/>
  <ellipse cx="34" cy="16.5" rx="5" ry="3.5" fill="#4a2e12"/>
  <ellipse cx="32" cy="15" rx="4" ry="3" fill="#522e10"/>

  <!-- Ear left -->
  <ellipse cx="18.5" cy="33" rx="3" ry="3.5" fill="#b8824c"/>
  <!-- Ear right -->
  <ellipse cx="45.5" cy="33" rx="3" ry="3.5" fill="#b8824c"/>

  <!-- Eyebrows — straight, casual -->
  <path d="M23 26.5 Q26.5 25 29.5 26" stroke="#3d2510" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M34.5 26 Q37.5 25 41 26.5" stroke="#3d2510" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Eyes — slightly relaxed/squinted -->
  <ellipse cx="27" cy="29.5" rx="3" ry="2.3" fill="#fff"/>
  <ellipse cx="37" cy="29.5" rx="3" ry="2.3" fill="#fff"/>
  <circle cx="27.5" cy="30" r="1.8" fill="#2a1808"/>
  <circle cx="37.5" cy="30" r="1.8" fill="#2a1808"/>
  <circle cx="28" cy="29.3" r="0.55" fill="#fff" opacity="0.9"/>
  <circle cx="38" cy="29.3" r="0.55" fill="#fff" opacity="0.9"/>

  <!-- Nose — slightly wider -->
  <path d="M30 33.5 Q32 36 34 33.5" stroke="#a06830" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Slight stubble / beard shadow -->
  <ellipse cx="32" cy="41" rx="9" ry="5" fill="#a06830" opacity="0.12"/>
  <ellipse cx="25" cy="39" rx="3" ry="2.5" fill="#a06830" opacity="0.1"/>
  <ellipse cx="39" cy="39" rx="3" ry="2.5" fill="#a06830" opacity="0.1"/>

  <!-- Smile — casual grin -->
  <path d="M27.5 38.5 Q32 42.5 36.5 38.5" stroke="#906040" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush subtle -->
  <ellipse cx="22" cy="36" rx="4" ry="2.5" fill="#e08858" opacity="0.15"/>
  <ellipse cx="42" cy="36" rx="4" ry="2.5" fill="#e08858" opacity="0.15"/>
</svg>
