<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="32" fill="#2d2d4e"/>

  <!-- Body / shoulders -->
  <ellipse cx="32" cy="76" rx="24" ry="20" fill="#1e1e3a"/>
  <ellipse cx="32" cy="73" rx="18" ry="14" fill="#2a2a4a"/>

  <!-- Neck -->
  <rect x="28" y="47" width="8" height="10" rx="2" fill="#c8a07a"/>

  <!-- Head -->
  <ellipse cx="32" cy="33" rx="14" ry="15" fill="#c8a07a"/>

  <!-- Hair — top and sides -->
  <ellipse cx="32" cy="20" rx="14" ry="8" fill="#1a0f0a"/>
  <ellipse cx="32" cy="24" rx="14" ry="5" fill="#1a0f0a"/>
  <ellipse cx="18.5" cy="30" rx="5" ry="9" fill="#1a0f0a"/>
  <ellipse cx="45.5" cy="30" rx="5" ry="9" fill="#1a0f0a"/>

  <!-- Ear left -->
  <ellipse cx="18" cy="34" rx="3" ry="4" fill="#b8906a"/>
  <!-- Ear right -->
  <ellipse cx="46" cy="34" rx="3" ry="4" fill="#b8906a"/>

  <!-- Eyebrows -->
  <path d="M23 27 Q27 25 29 27" stroke="#1a0f0a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M35 27 Q37 25 41 27" stroke="#1a0f0a" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="27" cy="30" rx="3" ry="2.5" fill="#fff"/>
  <ellipse cx="37" cy="30" rx="3" ry="2.5" fill="#fff"/>
  <circle cx="27.5" cy="30.5" r="1.8" fill="#2a1a0a"/>
  <circle cx="37.5" cy="30.5" r="1.8" fill="#2a1a0a"/>
  <circle cx="28" cy="29.8" r="0.6" fill="#fff" opacity="0.9"/>
  <circle cx="38" cy="29.8" r="0.6" fill="#fff" opacity="0.9"/>

  <!-- Nose -->
  <path d="M30.5 33 Q32 36 33.5 33" stroke="#a07850" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M27 39 Q32 43 37 39" stroke="#a07850" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Subtle cheek blush -->
  <ellipse cx="22" cy="37" rx="4" ry="2.5" fill="#e08860" opacity="0.2"/>
  <ellipse cx="42" cy="37" rx="4" ry="2.5" fill="#e08860" opacity="0.2"/>
</svg>
